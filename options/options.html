<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Commenter — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 40px 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    input:focus {
      border-color: #6366f1;
      background: #fff;
    }

    .toggle-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 0.8rem;
      padding: 2px 4px;
      user-select: none;
    }

    .toggle-btn:hover { color: #444; }

    .hint {
      margin-top: 6px;
      font-size: 0.78rem;
      color: #888;
    }

    .hint a {
      color: #6366f1;
      text-decoration: none;
    }

    .hint a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    button.save {
      padding: 9px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.save:hover { background: #4f46e5; }
    button.save:active { background: #4338ca; }

    button.clear {
      padding: 9px 16px;
      background: none;
      color: #888;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    button.clear:hover { border-color: #ef4444; color: #ef4444; }

    #status {
      font-size: 0.85rem;
      font-weight: 500;
      min-height: 1.2em;
    }

    #status.success { color: #16a34a; }
    #status.error   { color: #dc2626; }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 28px 0;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 16px;
    }

    .key-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }

    .dot.saved  { background: #16a34a; }
    .dot.missing { background: #d1d5db; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Context Commenter</h1>
    <p class="subtitle">Configure your settings below.</p>

    <p class="section-title">Claude API Key</p>

    <div class="field">
      <label for="apiKey">API Key</label>
      <div class="input-wrap">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false" />
        <button class="toggle-btn" id="toggleVisibility" title="Show/hide key" aria-label="Show key">
          <!-- eye-open icon; swapped to eye-closed by JS when revealed -->
          <svg id="eyeOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <p class="hint">
        Get your key from
        <a href="https://console.anthropic.com/account/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
        It is stored only in your browser via <code>chrome.storage.local</code>.
      </p>
    </div>

    <div class="actions">
      <button class="save" id="saveBtn">Save</button>
      <button class="clear" id="clearBtn">Clear key</button>
      <span id="status"></span>
    </div>

    <hr />

    <p class="section-title">Current status</p>
    <div class="key-status" id="keyStatusRow">
      <div class="dot saved" id="statusDot"></div>
      <span id="keyStatusText">API key saved</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
